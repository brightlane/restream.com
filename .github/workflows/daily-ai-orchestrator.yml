name: Daily AI Orchestration

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (creates package-lock.json in runner)
        run: npm install

      - name: Run orchestrator
        run: npm start

      - name: Run repair orchestrator
        run: npm run repair
