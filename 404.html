<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      flex-direction: column;
    }

    h1 {
      font-size: 5rem;
      margin: 0;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    a {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    a:hover {
      background: #2563eb;
    }
  </style>

  <!-- Auto redirect after 5 seconds -->
  <script>
    setTimeout(() => {
      window.location.href = "/restream.com/";
    }, 5000);
  </script>
</head>

<body>
  <h1>404</h1>
  <p>Oops! The page you’re looking for doesn’t exist.</p>

  <a href="/restream.com/">Go Home</a>

  <p style="margin-top: 15px; font-size: 0.9rem;">
    Redirecting you back in 5 seconds...
  </p>
</body>
</html>
